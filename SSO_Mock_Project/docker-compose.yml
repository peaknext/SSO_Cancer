services:
  mock-his:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4001
      HIS_API_KEY: mock-his-api-key-2024
    ports:
      - '4001:4001'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4001/health']
      interval: 30s
      timeout: 5s
      retries: 3
